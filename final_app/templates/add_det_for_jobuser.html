<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Professional Details</title>
    <link rel="stylesheet" href="{% static 'css/add_det_forjobuser.css' %}">
    <style>
        /* Basic styling for messages */
        .messages {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Professional Details</h2>
        
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </li>
                {% endfor %}
            </ul>
        {% endif %}
        <p>Please update your information to help employers find you.</p>
        
        <form action="{% url 'det_fo_jobuser_save' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group-row">
                <div class="form-group">
                    <label for="img">Candidate Photo</label>
                    <input type="file" name="image" accept="image/*" required>
                </div> 
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" value="{{user.first_name}}" required>
                </div>
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" value="{{user.last_name}}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="eemail">Email Address</label>
                <input type="email" id="eemail" name="eemail" value="{{user.email}}" required>
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob">
                </div>
                <div class="form-group">
                    <label for="pnumber">Phone Number</label>
                    <input type="text" id="pnumber" name="pnumber" 
                           pattern="\d{10}" title="Must be 10 digits" 
                           maxlength="10" value="{{user.phonenumber}}">
                </div>
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="City, Country">
            </div>

            <div class="form-group">
                <label for="l_quali">Latest Qualification</label>
                <input type="text" id="l_quali" name="l_quali" placeholder="e.g. B.Tech Computer Science">
            </div>

            <div class="form-group">
                <label for="skills">Skills</label>
                <input type="text" id="skills" name="skills" placeholder="e.g. Python, Django, SQL">
            </div>

            <div class="form-group">
                <label for="expe">Years of Experience</label>
                <input type="number" id="expe" name="expe" placeholder="0">
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Save Details</button>
                <a href="{% url 'userfront_load' %}" class="btn-back">Back to Dashboard</a>
            </div>
        </form>
    </div>
</body>
</html>
