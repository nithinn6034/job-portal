<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Login | Find Your Dream Job</title>
    <link rel="stylesheet" href="{% static 'css/loginuser.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <div class="login-box">
            <div class="header">
                <!-- <h1>Welcome Back!</h1> -->
                <p>Log in to your career dashboard</p>
            </div>

            <form action="{% url 'userlog_load' %}" method="post">
                {% csrf_token %}
                
                <div class="input-container">
                    <input type="text" name="username" placeholder="Username" required>
                    <i class="icon-user"></i>
                </div>

                <div class="input-container">
                    <input type="password" name="pass" placeholder="Password" required>
                    <i class="icon-lock"></i>
                </div>
                
                <button type="submit" class="btn-login">Login to My Account</button>

                {% if messages %}
                    <div class="message-container">
                        {% for i in messages %}
                            <p class="error-msg">{{ i }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            </form>

            <div class="footer-links">
                <p>Don't have an account? <a href="{% url 'signup_load_user' %}">Sign Up</a></p>
                <p> <a href="{% url 'display' %}">Back to Dashboard</a></p>
            </div>
        </div>
    </div>
</body>
</html>
