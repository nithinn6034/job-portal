<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job Details | Admin</title>
    <link rel="stylesheet" href="{% static 'css/added_job_list_edit.css' %}">
</head>
<body>

<div class="edit-container">
    <header class="edit-header">
        <h1>Edit Job Posting</h1>
        <p>Modify the details for the <strong>{{ a.job_name }}</strong> position.</p>
    </header>

    <div class="form-card">
        <form action="{% url 'add_job_list_edit_load' a.id %}" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="name">Job Title</label>
                <input type="text" id="name" name="name" value="{{ a.job_name }}" required placeholder="e.g. Senior Developer">
            </div>

            <div class="form-group">
                <label for="salary">Monthly Salary (₹)</label>
                <input type="number" id="salary" name="salary" value="{{ a.job_salary }}" required>
            </div>

            <div class="form-group">
                <label for="skill">Skill Requirements</label>
                <textarea id="skill" name="skill" rows="3" required>{{ a.job_skill }}</textarea>
                <small>Separate skills with commas (e.g., Python, Django, SQL)</small>
            </div>

            <div class="form-group">
                <label for="quali">Required Qualification</label>
                <input type="text" id="quali" name="quali" value="{{ a.job_qualification }}" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Update Job Posting</button>
                <a href="{% url 'added_job_list' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
