<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/addjobadmin.css' %}">
</head>
<body>

    <div class="main-wrapper">
        <div class="form-card">
            <div class="form-header">
                <i class="fas fa-briefcase icon-header"></i>
                <h1>Create Job Listing</h1>
                <p>Enter the details to publish a new career opportunity.</p>
            </div>

            <form action="{% url 'add_job' %}" method="post" class="job-form"> 
                {% csrf_token %}
                
                <div class="field-wrapper">
                    <label>Job Title</label>
                    <div class="input-container">
                        <i class="fas fa-pen-nib"></i>
                        <input type="text" name="job" placeholder="e.g. Senior Python Developer" required>
                    </div>
                </div>

                <div class="field-wrapper">
                    <label>Annual Salary (USD)</label>
                    <div class="input-container">
                        <i class="fas fa-dollar-sign"></i>
                        <input type="number" name="salary" placeholder="e.g. 85000" required>
                    </div>
                </div>

                <div class="field-wrapper">
                    <label>Core Skills</label>
                    <div class="input-container">
                        <i class="fas fa-code"></i>
                        <input type="text" name="skill" placeholder="e.g. Django, React, AWS" required>
                    </div>
                </div>

                <div class="field-wrapper">
                    <label>Required Qualification</label>
                    <div class="input-container">
                        <i class="fas fa-graduation-cap"></i>
                        <input type="text" name="quali" placeholder="e.g. B.Tech in CS" required> 
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <span>Publish Job</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div class="footer-links">
                    <a href="{% url 'adminfront_load' %}" class="btn-back">
                        <i class="fas fa-chevron-left"></i> Back to Dashboard
                    </a>
                </div>
            </form>

            {% if messages %}
            <div class="status-messages">
                {% for message in messages %}
                <div class="alert {{ message.tags }}">
                    <i class="fas fa-info-circle"></i> {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
