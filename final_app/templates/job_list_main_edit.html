<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job Details</title>
    <link rel="stylesheet" href="{% static 'css/job_list_main_edit_load.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-briefcase"></i>
                <span>Admin<span>Panel</span></span>
            </div>
            <nav>
                <a href="{% url 'main_admin' %}">Dashboard</a>
                <a href="javascript:history.back()" class="back-btn">Cancel</a>
            </nav>
        </div>
    </header>

    <main class="content-wrapper">
        <div class="edit-card">
            <div class="card-title">
                <h2>Edit Job Post</h2>
                <p>Update the requirements and compensation for this position.</p>
            </div>

            <form action="{% url 'job_list_main_edit_load' a.id %}" method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Job Name</label>
                    <input type="text" name="name" value="{{a.job_name}}" placeholder="e.g. Software Engineer" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-graduation-cap"></i> Qualification</label>
                    <input type="text" name="quali" value="{{a.job_qualification}}" placeholder="e.g. B.Tech / MCA" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tools"></i> Required Skills</label>
                    <input type="text" name="skill" value="{{a.job_skill}}" placeholder="e.g. Python, Django, React" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-indian-rupee-sign"></i> Salary Range</label>
                    <input type="text" name="salary" value="{{a.job_salary}}" placeholder="e.g. 5LPA - 8LPA" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-done">Update Job Details</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Admin Management System. All rights reserved.</p>
    </footer>

</body>
</html>
